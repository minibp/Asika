<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "styles"}}
    <title>PR #{{.pr_id}} - Asika</title>
</head>
<body>
{{template "header" .}}
<div class="container">
<div id="prDetail">Loading...</div>
<div style="margin: 20px 0;" id="actions"></div>
<div class="card" style="margin-top: 20px;">
    <h2>Events</h2>
    <div id="eventList">Loading...</div>
</div>
</div>
{{template "scripts"}}
<script>
    var repoGroup='{{.repo_group}}',prId='{{.pr_id}}';
    async function L(){
        try {
            var r = await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId);
            if(!r.ok){ D('err:load'); return; }
            var p = await r.json();
            
            var platformLink = p.html_url 
                ? '<a href="'+escapeHtml(p.html_url)+'" target="_blank" style="color: #0066cc;">'+escapeHtml(p.platform)+' ↗</a>' 
                : escapeHtml(p.platform);
            
            document.getElementById('prDetail').innerHTML = 
                '<h1>'+escapeHtml(p.title)+' <span style="font-size:14px;color:#666;">#'+p.pr_number+'</span></h1>' +
                '<p><strong>Author:</strong> '+escapeHtml(p.author)+'</p>' +
                '<p><strong>State:</strong> <span class="status-'+escapeHtml(p.state)+'">'+escapeHtml(p.state)+'</span></p>' +
                '<p><strong>Platform:</strong> '+platformLink+'</p>' +
                '<p><strong>Labels:</strong> '+(p.labels||[]).map(function(l){return'<span class="label">'+escapeHtml(l)+'</span>'}).join('')+'</p>';
            
            var a = '';
            if(p.state === 'open'){
                if(!p.is_approved){
                    a += '<button class="btn btn-success" onclick="A()">Approve</button> ';
                } else {
                    a += '<span style="color: #28a745; font-weight: 600; padding: 8px 14px; display: inline-block;">✓ Approved</span> ';
                }
                a += '<button class="btn btn-danger" onclick="C()">Close</button> ';
            }
            a += '<button class="btn btn-secondary" onclick="R()">Reopen</button> ';
            a += '<button class="btn" onclick="S()" style="background:#ffc107;color:black;">Mark Spam</button>';
            document.getElementById('actions').innerHTML = a;
            
            if(p.events && p.events.length > 0){
                document.getElementById('eventList').innerHTML = p.events.map(function(e){
                    return '<div style="padding:10px;border-left:3px solid #0066cc;margin:10px 0;">' +
                        '<strong>'+escapeHtml(e.action)+'</strong> by '+escapeHtml(e.actor)+' at '+new Date(e.timestamp).toLocaleString() +
                        (e.detail ? '<p style="margin:5px 0 0 0;color:#666;font-size:13px;">'+escapeHtml(e.detail)+'</p>' : '') +
                        '</div>';
                }).join('');
            } else {
                document.getElementById('eventList').innerHTML = '<p style="color:#666;">No events yet</p>';
            }
        } catch(e) {
            console.error(e);
            D('err:'+e.message);
        }
    }
    async function A(){ if(confirm('Approve?')){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/approve',{method:'POST'}); L(); } }
    async function C(){ if(confirm('Close?')){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/close',{method:'POST'}); L(); } }
    async function R(){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/reopen',{method:'POST'}); L(); }
    async function S(){ if(confirm('Mark spam?')){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+prId+'/spam',{method:'POST'}); L(); } }
    function D(m){ document.getElementById('prDetail').innerHTML = '<p class="error">'+m+'</p>'; }
    L();
</script>
{{template "client_auth"}}
</body>
</html>
