<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "styles"}}
    <title>{{.title}}</title>
</head>
<body>
{{template "header" .}}
<div class="container">
<h1>Dashboard</h1>
<div class="stats">
    <div class="stat-card">
        <h3>Open PRs</h3>
        <p id="openPRs">-</p>
    </div>
    <div class="stat-card">
        <h3>Queue Items</h3>
        <p id="queueItems">-</p>
    </div>
    <div class="stat-card">
        <h3>Repo Groups</h3>
        <p id="repoGroups">-</p>
    </div>
</div>
<div class="card" style="margin-top: 20px;">
    <h2>Recent Activity</h2>
    <div id="activity">Loading...</div>
</div>
</div>
{{template "scripts"}}
<script>
    async function loadDashboard() {
        try {
            const resp = await apiRequest('/api/v1/repos/main/prs?state=open');
            if (resp.ok) {
                const prs = await resp.json();
                document.getElementById('openPRs').textContent = prs.length;
            }
            const qResp = await apiRequest('/api/v1/queue/main');
            if (qResp.ok) {
                const queue = await qResp.json();
                document.getElementById('queueItems').textContent = queue.length;
            }
            document.getElementById('repoGroups').textContent = '1';

            const logResp = await apiRequest('/api/v1/logs');
            const act = document.getElementById('activity');
            if (logResp.ok) {
                const logs = await logResp.json();
                if (logs.length === 0) {
act.innerHTML = '<p style="color:#666">No recent activity</p>';
                } else {
                    act.innerHTML = logs.slice(0, 10).map(l =>
                        '<div class="activity-item">' +
                        '<span class="activity-time">' + l.timestamp + '</span> ' +
                        '<span class="activity-msg">' + l.message + '</span>' +
                        '</div>'
                    ).join('');
                }
            } else {
                act.innerHTML = '<p style="color:#666">No recent activity</p>';
            }
        } catch (e) {
            document.getElementById('activity').innerHTML = '<p style="color:var(--text-secondary)">No recent activity</p>';
        }
    }
    loadDashboard();
</script>
{{template "client_auth"}}
</body>
</html>
