<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "styles"}}
    <title>{{.title}}</title>
</head>
<body>
{{template "header" .}}
<div class="container">
<h1>Dashboard</h1>
<div class="stats">
    <div class="stat-card">
        <h3>Open PRs</h3>
        <p id="openPRs">-</p>
    </div>
    <div class="stat-card">
        <h3>Stale PRs</h3>
        <p id="stalePRs">-</p>
    </div>
    <div class="stat-card">
        <h3>Queue Items</h3>
        <p id="queueItems">-</p>
    </div>
    <div class="stat-card">
        <h3>Repo Groups</h3>
        <p id="repoGroups">-</p>
    </div>
</div>
<div class="card" style="margin-top: 20px;">
    <h2>Recent Activity</h2>
    <div id="activity">Loading...</div>
</div>
</div>
{{template "scripts"}}
<script>
    let repoGroupsList = [];

    async function loadRepoGroups() {
        try {
            const resp = await apiRequest('/api/v1/config');
            if (resp.ok) {
                const cfg = await resp.json();
                if (cfg.repo_groups) {
                    repoGroupsList = cfg.repo_groups.map(g => g.name);
                }
                if (cfg.single_repo && cfg.single_repo.repo && repoGroupsList.length === 0) {
                    repoGroupsList = ['default'];
                }
                if (repoGroupsList.length === 0) {
                    repoGroupsList = ['default'];
                }
            }
        } catch (e) {
            repoGroupsList = ['default'];
        }
    }

    async function loadDashboard() {
        try {
            await loadRepoGroups();
            document.getElementById('repoGroups').textContent = repoGroupsList.length;

            let totalOpen = 0;
            let totalStale = 0;

            for (const group of repoGroupsList) {
                try {
                    const resp = await apiRequest('/api/v1/repos/' + group + '/prs?state=open');
                    if (resp.ok) {
                        const body = await resp.json();
                        const prs = Array.isArray(body) ? body : (body.data || []);
                        totalOpen += prs.length;
                        for (const pr of prs) {
                            if (pr.labels && pr.labels.includes('stale')) totalStale++;
                        }
                    }
                } catch (e) {}
            }

            document.getElementById('openPRs').textContent = totalOpen;
            document.getElementById('stalePRs').textContent = totalStale;

            let totalQueue = 0;
            for (const group of repoGroupsList) {
                try {
                    const qResp = await apiRequest('/api/v1/queue/' + group);
                    if (qResp.ok) {
                        const items = await qResp.json();
                        if (Array.isArray(items)) totalQueue += items.length;
                    }
                } catch (e) {}
            }
            document.getElementById('queueItems').textContent = totalQueue;

            const logResp = await apiRequest('/api/v1/logs');
            const act = document.getElementById('activity');
            if (logResp.ok) {
                const logs = await logResp.json();
                if (logs.length === 0) {
                    act.innerHTML = '<p style="color:#666">No recent activity</p>';
                } else {
                    act.innerHTML = logs.slice(0, 10).map(l =>
                        '<div class="activity-item">' +
                        '<span class="activity-time">' + escapeHtml(l.timestamp) + '</span> ' +
                        '<span class="activity-msg">' + escapeHtml(l.message) + '</span>' +
                        '</div>'
                    ).join('');
                }
            } else {
                act.innerHTML = '<p style="color:#666">No recent activity</p>';
            }
        } catch (e) {
            document.getElementById('activity').innerHTML = '<p style="color:var(--text-secondary)">No recent activity</p>';
        }
    }
    loadDashboard();
</script>
{{template "client_auth"}}
</body>
</html>
