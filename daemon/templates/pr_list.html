<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "styles"}}
    <title>{{.title}}</title>
</head>
<body>
{{template "header" .}}
<div class="container">
<h1>PR List</h1>
<div class="form-group">
    <label>Filter by state:</label>
    <select id="stateFilter" onchange="loadPRs()">
        <option value="open">Open</option>
        <option value="closed">Closed</option>
        <option value="merged">Merged</option>
        <option value="">All</option>
    </select>
</div>
<div class="card">
    <div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Title</th>
                <th>Author</th>
                <th>Platform</th>
                <th>State</th>
                <th>Labels</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="prTableBody">
            <tr><td colspan="7" style="text-align: center;">Loading...</td></tr>
        </tbody>
    </table>
    </div><!-- .table-wrapper -->
</div>
</div>
{{template "scripts"}}
<script>
    async function loadPRs() {
        const state = document.getElementById('stateFilter').value;
        const tbody = document.getElementById('prTableBody');
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Loading...</td></tr>';
        try {
            const resp = await apiRequest('/api/v1/repos/main/prs' + (state ? '?state=' + state : ''));
            const body = await resp.json();
            if (body.error) { tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #dc3545;">' + body.error + '</td></tr>'; return; }
            const prs = Array.isArray(body) ? body : (body.data || []);
            if (prs.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">No PRs found</td></tr>'; return; }
            tbody.innerHTML = prs.map(pr => '<tr><td>'+pr.pr_number+'</td><td><a href="/prs/'+pr.pr_number+'" style="color: #0066cc; text-decoration: none;">'+escapeHtml(pr.title)+'</a></td><td>'+escapeHtml(pr.author)+'</td><td>'+escapeHtml(pr.platform)+'</td><td class="status-'+escapeHtml(pr.state)+'">'+escapeHtml(pr.state)+'</td><td>'+(pr.labels||[]).map(l=>'<span class="label">'+escapeHtml(l)+'</span>').join('')+'</td><td>'+(pr.state==='open'?'<button class="btn btn-success" onclick="approvePR('+pr.pr_number+')" style="padding: 4px 8px; font-size: 12px;">Approve</button> <button class="btn btn-danger" onclick="closePR('+pr.pr_number+')" style="padding: 4px 8px; font-size: 12px;">Close</button>':'')+'</td></tr>').join('');
            } catch (e) { tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">No PRs found</td></tr>'; }
        }
    async function approvePR(n) { if(confirm('Approve PR #'+n+'?')){ await apiRequest('/api/v1/repos/main/prs/'+n+'/approve',{method:'POST'}); loadPRs(); } }
    async function closePR(n) { if(confirm('Close PR #'+n+'?')){ await apiRequest('/api/v1/repos/main/prs/'+n+'/close',{method:'POST'}); loadPRs(); } }
    loadPRs();
</script>
{{template "client_auth"}}
</body>
</html>
