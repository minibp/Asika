<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "styles"}}
    <title>{{.title}}</title>
</head>
<body>
{{template "header" .}}
<div class="container">
<h1>PR List</h1>
<div class="form-group">
    <label>Repository Group:</label>
    <select id="repoGroupSelect" onchange="changePage(1)">
        <option value="default">default</option>
    </select>
</div>
<div class="form-group">
    <label>Filter by state:</label>
    <select id="stateFilter" onchange="changePage(1)">
        <option value="open">Open</option>
        <option value="closed">Closed</option>
        <option value="merged">Merged</option>
        <option value="">All</option>
    </select>
</div>
<div class="card">
    <div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Title</th>
                <th>Author</th>
                <th>Platform</th>
                <th>State</th>
                <th>Labels</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="prTableBody">
            <tr><td colspan="7" style="text-align: center;">Loading...</td></tr>
        </tbody>
    </table>
    </div><!-- .table-wrapper -->
    <div id="pagination" class="pagination"></div>
</div>
</div>
{{template "scripts"}}
<script>
    var currentPage = 1;
    var perPage = 20;
    var totalPRs = 0;
    async function loadRepoGroups() {
        try {
            const resp = await apiRequest('/api/v1/config');
            if (resp.ok) {
                const cfg = await resp.json();
                const sel = document.getElementById('repoGroupSelect');
                sel.innerHTML = '';
                if (cfg.repo_groups && cfg.repo_groups.length > 0) {
                    cfg.repo_groups.forEach(g => {
                        const opt = document.createElement('option');
                        opt.value = g.name;
                        opt.textContent = g.name;
                        sel.appendChild(opt);
                    });
                } else {
                    const opt = document.createElement('option');
                    opt.value = 'default';
                    opt.textContent = 'default';
                    sel.appendChild(opt);
                }
            }
        } catch (e) {}
    }
    function changePage(page) {
        currentPage = page;
        loadPRs();
    }
    async function loadPRs() {
        const repoGroup = document.getElementById('repoGroupSelect').value;
        const state = document.getElementById('stateFilter').value;
        const tbody = document.getElementById('prTableBody');
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Loading...</td></tr>';
        try {
            var params = '?page=' + currentPage + '&per_page=' + perPage;
            if (state) params += '&state=' + state;
            const resp = await apiRequest('/api/v1/repos/' + repoGroup + '/prs' + params);
            const body = await resp.json();
            if (body.error) { tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #dc3545;">' + body.error + '</td></tr>'; return; }
            var prs, total, page;
            if (Array.isArray(body)) {
                prs = body;
                total = body.length;
                page = 1;
            } else {
                prs = body.data || [];
                total = body.total || 0;
                page = body.page || 1;
            }
            totalPRs = total;
            currentPage = page;
            if (prs.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">No PRs found</td></tr>'; renderPagination(); return; }
            tbody.innerHTML = prs.map(pr => {
                let actions = '';
                if (pr.state === 'open') {
                    if (!pr.is_approved) {
                        actions += '<button class="btn btn-success" onclick="approvePR('+pr.pr_number+')" style="padding: 4px 8px; font-size: 12px;">Approve</button> ';
                    } else {
                        actions += '<span style="color: #28a745; font-size: 12px; padding: 4px 8px;">✓ Approved</span> ';
                    }
                    actions += '<button class="btn btn-danger" onclick="closePR('+pr.pr_number+')" style="padding: 4px 8px; font-size: 12px;">Close</button>';
                }
                return '<tr><td>'+pr.pr_number+'</td><td><a href="/prs/'+pr.pr_number+'" style="color: #0066cc; text-decoration: none;">'+escapeHtml(pr.title)+'</a></td><td>'+escapeHtml(pr.author)+'</td><td>'+(pr.html_url?'<a href="'+escapeHtml(pr.html_url)+'" target="_blank" title="View on platform">'+escapeHtml(pr.platform)+' ↗</a>':escapeHtml(pr.platform))+'</td><td class="status-'+escapeHtml(pr.state)+'">'+escapeHtml(pr.state)+'</td><td>'+(pr.labels||[]).map(l=>'<span class="label">'+escapeHtml(l)+'</span>').join('')+'</td><td>'+actions+'</td></tr>';
            }).join('');
            } catch (e) { tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">No PRs found</td></tr>'; }
        renderPagination();
    }
    function renderPagination() {
        const el = document.getElementById('pagination');
        const totalPages = Math.ceil(totalPRs / perPage);
        if (totalPages <= 1) { el.innerHTML = ''; return; }
        var html = '<span class="pagination-info">' + totalPRs + ' PRs, page ' + currentPage + ' of ' + totalPages + '</span>';
        html += '<div class="pagination-btns">';
        if (currentPage > 1) {
            html += '<button class="btn btn-secondary btn-sm" onclick="changePage(' + (currentPage - 1) + ')">&laquo; Prev</button>';
        }
        var start = Math.max(1, currentPage - 2);
        var end = Math.min(totalPages, currentPage + 2);
        if (start > 1) {
            html += '<button class="btn btn-secondary btn-sm" onclick="changePage(1)">1</button>';
            if (start > 2) html += '<span class="pagination-ellipsis">...</span>';
        }
        for (var i = start; i <= end; i++) {
            if (i === currentPage) {
                html += '<button class="btn btn-primary btn-sm" disabled>' + i + '</button>';
            } else {
                html += '<button class="btn btn-secondary btn-sm" onclick="changePage(' + i + ')">' + i + '</button>';
            }
        }
        if (end < totalPages) {
            if (end < totalPages - 1) html += '<span class="pagination-ellipsis">...</span>';
            html += '<button class="btn btn-secondary btn-sm" onclick="changePage(' + totalPages + ')">' + totalPages + '</button>';
        }
        if (currentPage < totalPages) {
            html += '<button class="btn btn-secondary btn-sm" onclick="changePage(' + (currentPage + 1) + ')">Next &raquo;</button>';
        }
        html += '</div>';
        el.innerHTML = html;
    }
    async function approvePR(n) {
        const repoGroup = document.getElementById('repoGroupSelect').value;
        if(confirm('Approve PR #'+n+'?')){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+n+'/approve',{method:'POST'}); loadPRs(); } }
    async function closePR(n) {
        const repoGroup = document.getElementById('repoGroupSelect').value;
        if(confirm('Close PR #'+n+'?')){ await apiRequest('/api/v1/repos/'+repoGroup+'/prs/'+n+'/close',{method:'POST'}); loadPRs(); } }
    loadRepoGroups();
    loadPRs();
</script>
{{template "client_auth"}}
</body>
</html>
