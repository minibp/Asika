<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{template "styles"}}
    <title>Queue - Asika</title>
</head>
<body>
{{template "header" .}}
<div class="container">
<h1>Merge Queue</h1>
<div class="card">
    <p style="margin:0 0 15px 0; color: #666;">Repository Group: <strong>main</strong></p>
    <button class="btn btn-primary" onclick="recheckQueue()">Recheck Queue</button>
    <div class="table-wrapper">
    <table style="margin-top: 20px;">
        <thead>
            <tr>
                <th>PR</th>
                <th>Title</th>
                <th>Status</th>
                <th>Approvals</th>
                <th>CI Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="queueBody">
            <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
        </tbody>
    </table>
    </div>
</div>
</div>
{{template "scripts"}}
<script>
    async function loadQueue() {
        const tbody = document.getElementById('queueBody');
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Loading...</td></tr>';
        try {
            const resp = await apiRequest('/api/v1/queue/main');
            if (!resp.ok) { tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No items in queue</td></tr>'; return; }
            const items = await resp.json();
            if (items.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Queue is empty</td></tr>'; return; }
            tbody.innerHTML = items.map(item => '<tr><td>#'+item.pr_id+'</td><td>'+(item.title||'PR #'+item.pr_id)+'</td><td class="status-'+item.status+'">'+item.status+'</td><td>'+((item.criteria&&item.criteria.approved_by)?item.criteria.approved_by.join(', '):'-')+'</td><td>'+(item.criteria?item.criteria.ci_status:'-')+'</td><td>'+({'waiting':'<span style="color: #ffc107;">Waiting for conditions</span>','checking':'<span style="color: #17a2b8;">Checking...</span>','done':'<span style="color: #28a745;">Ready to merge</span>','failed':'<span style="color: #dc3545;">Failed</span>'}[item.status]||'')+'</td></tr>').join('');
        } catch (e) { tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No items in queue</td></tr>'; }
    }
    async function recheckQueue() {
        try { const resp = await apiRequest('/api/v1/queue/main/recheck',{method:'POST'}); if(resp.ok){ alert('Queue recheck triggered!'); setTimeout(loadQueue,1000); } else { alert('Nothing to recheck'); } } catch(e){ alert('Nothing to recheck'); }
    }
    loadQueue();
</script>
{{template "client_auth"}}
</body>
</html>
