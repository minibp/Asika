name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Checkout pack
        uses: actions/checkout@v4
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        run: |
          mkdir -p bin
          TAG=${GITHUB_REF#refs/tags/v}
          HASH=$(git rev-parse --short=7 HEAD)
          TAG="${TAG}-${HASH}"
          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              if [ "$GOOS" = "windows" ] && [ "$GOARCH" = "arm64" ]; then
                continue
              fi
              EXT=""
              [ "$GOOS" = "windows" ] && EXT=".exe"
              NAME="asikad-${GOOS}-${GOARCH}${EXT}"
              echo "Building $NAME..."
              LDFLAGS="-s -w -X 'asika/common/version.Version=$TAG'"
              if [ "$GOOS" = "linux" ]; then
                LDFLAGS="$LDFLAGS -X 'asika/common/version.Enabled=true'"
              fi
              GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 \
                go build -ldflags="$LDFLAGS" \
                -o "bin/$NAME" ./cmd/asikad
            done
          done
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              NAME="asika-${GOOS}-${GOARCH}"
              echo "Building $NAME..."
              LDFLAGS="-s -w -X 'asika/common/version.Version=$TAG'"
              if [ "$GOOS" = "linux" ]; then
                LDFLAGS="$LDFLAGS -X 'asika/common/version.Enabled=true'"
              fi
              GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 \
                go build -ldflags="$LDFLAGS" \
                -o "bin/$NAME" ./cmd/asika
            done
          done
          for GOARCH in amd64; do
            NAME="asika-windows-${GOARCH}.exe"
            echo "Building $NAME..."
            LDFLAGS="-s -w -X 'asika/common/version.Version=$TAG'"
            GOOS=windows GOARCH=$GOARCH CGO_ENABLED=0 \
              go build -ldflags="$LDFLAGS" \
              -o "bin/$NAME" ./cmd/asika
          done

      - name: Package tarballs and generate checksums
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          mkdir -p dist

          for GOARCH in amd64 arm64; do
            PKG="asika-linux-${GOARCH}"
            mkdir -p "dist/${PKG}"
            cp "bin/asikad-linux-${GOARCH}" "dist/${PKG}/asikad"
            cp "bin/asika-linux-${GOARCH}" "dist/${PKG}/asika"
            cp pack/templates/service/asikad.service "dist/${PKG}/"
            cp pack/templates/service/asikad.openrc "dist/${PKG}/"
            cp pack/doc/asika.1 "dist/${PKG}/"
            cp pack/doc/asikad.1 "dist/${PKG}/"
            cp pack/doc/asika.html "dist/${PKG}/"
            cp pack/doc/asikad.html "dist/${PKG}/"
            tar -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
            sha512sum "bin/asikad-linux-${GOARCH}" > "dist/asikad-linux-${GOARCH}.sha512sum"
          done

          for GOARCH in amd64 arm64; do
            PKG="asika-darwin-${GOARCH}"
            mkdir -p "dist/${PKG}"
            cp "bin/asikad-darwin-${GOARCH}" "dist/${PKG}/asikad"
            cp "bin/asika-darwin-${GOARCH}" "dist/${PKG}/asika"
            cp pack/templates/service/com.asika.daemon.plist "dist/${PKG}/"
            cp pack/doc/asika.1 "dist/${PKG}/"
            cp pack/doc/asikad.1 "dist/${PKG}/"
            cp pack/doc/asika.html "dist/${PKG}/"
            cp pack/doc/asikad.html "dist/${PKG}/"
            tar -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
            sha512sum "bin/asikad-darwin-${GOARCH}" > "dist/asikad-darwin-${GOARCH}.sha512sum"
          done

          PKG="asika-windows-amd64"
          mkdir -p "dist/${PKG}"
          cp "bin/asikad-windows-amd64.exe" "dist/${PKG}/asikad.exe"
          cp "bin/asika-windows-amd64.exe" "dist/${PKG}/asika.exe"
          cp pack/doc/asika.1 "dist/${PKG}/"
          cp pack/doc/asikad.1 "dist/${PKG}/"
          cp pack/doc/asika.html "dist/${PKG}/"
          cp pack/doc/asikad.html "dist/${PKG}/"
          tar -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
          sha512sum "bin/asikad-windows-amd64.exe" > "dist/asikad-windows-amd64.sha512sum"

          ls -lh dist/

      - uses: actions/upload-artifact@v6
        with:
          name: binaries
          path: |
            dist/*.tar.gz
            dist/*.sha512sum

  package-deb:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: binaries
          path: bin/

      - name: Checkout pack
        uses: actions/checkout@v4
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tarball
        run: |
          cd bin
          tar -xzf asika-linux-${{ matrix.goarch }}.tar.gz
          cp asika-linux-${{ matrix.goarch }}/asika .. || true
          cp asika-linux-${{ matrix.goarch }}/asikad .. || true
          cd ..

      - name: Package DEB
        run: bash pack/scripts/package-deb.sh
        env:
          TAG_NAME: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v6
        with:
          name: deb-packages
          path: dist/*.deb

  package-pkg:
    needs: build
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: binaries
          path: bin/

      - name: Checkout pack
        uses: actions/checkout@v6
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tarball
        run: |
          cd bin
          tar -xzf asika-darwin-${{ matrix.goarch }}.tar.gz
          cp asika-darwin-${{ matrix.goarch }}/asikad asikad-darwin-${{ matrix.goarch }}
          cd ..

      - name: Package PKG
        run: bash pack/scripts/package-pkg.sh
        env:
          TAG_NAME: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v6
        with:
          name: pkg-packages
          path: dist/*.pkg

  package-inno:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: binaries
          path: bin/

      - name: Checkout pack
        uses: actions/checkout@v6
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tarball
        shell: bash
        run: |
          cd bin
          tar -xzf asika-windows-amd64.tar.gz
          cp asika-windows-amd64/asika.exe .. || true
          cp asika-windows-amd64/asikad.exe .. || true
          cd ..

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress --limit-output
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

      - name: Package Inno Setup
        shell: bash
        run: bash pack/scripts/package-inno.sh
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Move Inno output to dist/
        shell: bash
        run: |
          mkdir -p dist
          mv inno-build/Output/*-setup.exe dist/ 2>/dev/null || \
          mv inno-build/Output/*.exe dist/asika-${{ github.ref_name }}-setup.exe 2>/dev/null || true
          ls -la dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: inno-packages
          path: dist/*-setup.exe

  package-docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v6
        with:
          name: binaries
          path: bin/

      - name: Checkout pack
        uses: actions/checkout@v6
        with:
          repository: AsikaProject/pack
          path: pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tarball
        run: |
          cd bin
          tar -xzf asika-linux-amd64.tar.gz
          cp asika-linux-amd64/asika .. || true
          cp asika-linux-amd64/asikad .. || true
          cd ..

      - name: Package Docker
        run: bash pack/scripts/package-docker.sh
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_IMAGE_NAME: asikaproject/asika

  release:
    needs: [build, package-deb, package-pkg, package-inno, package-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp binaries/*.tar.gz release-assets/
          cp binaries/*.sha512sum release-assets/
          cp deb-packages/* release-assets/ 2>/dev/null || true
          cp pkg-packages/* release-assets/ 2>/dev/null || true
          cp inno-packages/* release-assets/ 2>/dev/null || true
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
